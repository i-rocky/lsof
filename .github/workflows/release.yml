name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (windows-x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build and package
        shell: pwsh
        env:
          TARGET: x86_64-pc-windows-msvc
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:GITHUB_REF_NAME
          $bin = "lsof.exe"
          $basename = "lsof-windows-x86_64-$version"

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          cargo build --release --locked --target $env:TARGET
          Copy-Item "target/$($env:TARGET)/release/$bin" "dist/$bin" -Force
          Compress-Archive -Path "dist/$bin" -DestinationPath "$basename.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsof-windows-x86_64
          path: lsof-windows-x86_64-*.zip
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name "*.zip" -exec cp {} dist/ \;
          (
            cd dist
            find . -maxdepth 1 -type f -name "*.zip" -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
